services:
  # ── Redis (required for multiplayer room state & matchmaking) ────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (Spring Boot — hot-reload via spring-boot:run) ───────────────
  #
  # NOTE: This service mounts your local source tree and runs via Maven.
  # Any change to a Java file will trigger Spring DevTools hot-reload.
  #
  # Usage:
  #   docker compose -f docker-compose.dev.yml up backend
  #
  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      # Mount the entire backend source for hot-reload
      - ./backend:/app
      # Cache Maven dependencies in a named volume to avoid re-downloading
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
      - "35729:35729"   # Spring DevTools LiveReload port
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Database — point to the host machine's PostgreSQL
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://host.docker.internal:5432/tradelearn}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use-in-production-ever}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Redis — point to the redis service above
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # CORS — allow the Vite/CRA dev server
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Spring DevTools remote restart secret
      SPRING_DEVTOOLS_REMOTE_SECRET: mysecret
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.devtools.restart.enabled=true"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend (React — hot-reload via CRA dev server) ────────────────────
  #
  # NOTE: This service mounts your local frontend source.
  # Any change to a .jsx/.js/.css file will trigger hot module replacement.
  #
  # Usage:
  #   docker compose -f docker-compose.dev.yml up frontend
  #
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      # Mount the entire frontend source for HMR
      - ./frontend:/app
      # Use a named volume for node_modules to avoid overwriting it
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
      # Needed for CRA to bind to all interfaces inside the container
      HOST: 0.0.0.0
      # Disable host check (safe for local dev only)
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      WATCHPACK_POLLING: "true"   # required for bind mounts on some OSes
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  redis_dev_data:
  maven_cache:
  frontend_node_modules:
