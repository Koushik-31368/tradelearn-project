#####################################################
# PRODUCTION — Environment variables required
#
# Set these as environment variables on Render (or
# your deployment platform). Do NOT store secrets here.
# See backend/.env.example for the full variable list.
#####################################################

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Override base log level for production
logging.level.com.tradelearn.server=INFO

# JWT — must be at least 64 bytes (512 bits) long
tradelearn.jwt.secret=${JWT_SECRET}
tradelearn.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Actuator / Health (Render health-check probe) ────────────
# Expose health, info, and prometheus (permitted in SecurityConfig).
management.endpoints.web.exposure.include=health,info,prometheus
# Never expose individual component details publicly (security best practice).
management.endpoint.health.show-details=never
# Enable liveness + readiness probes (/actuator/health/liveness, /readiness).
management.endpoint.health.probes.enabled=true

# ── Redis (disabled by default for MVP deployment) ────────────
# Set redis.enabled=true on Render and supply REDIS_HOST + REDIS_PORT
# to activate distributed matchmaking, distributed locks, and WebSocket relay.
# When false, all Redis beans and dependent services are skipped.
#
# IMPORTANT: spring-boot-starter-data-redis is on the classpath, so Spring Boot
# auto-configures a Lettuce connection factory regardless of redis.enabled.
# Without the settings below the app hangs at startup trying to connect to
# localhost:6379 (which does not exist on Render), blocking port binding.
#   • lazy-connect=true  → connection is established on first use, not at boot
#   • connect-timeout    → fast-fail (2 s) if a connection is ever attempted
#   • health exclusion   → prevents /actuator/health returning DOWN due to Redis
redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.connect-timeout=2000
spring.data.redis.lettuce.lazy-connect=true
spring.data.redis.lettuce.pool.enabled=false
management.health.redis.enabled=${REDIS_ENABLED:false}