#####################################################
# Base Configuration — shared across all profiles
#
# Profile-specific overrides live in:
#   application-local.properties  (local dev)
#   application-prod.properties   (Render production)
#
# Active profile is controlled by the environment variable:
#   SPRING_PROFILES_ACTIVE=local  (default)
#   SPRING_PROFILES_ACTIVE=prod   (production)
#####################################################

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.application.name=tradelearn-backend
server.port=${PORT:8080}

# ── JPA Base Settings ─────────────────────────────────────
spring.jpa.open-in-view=false
# SQL logging is OFF by default — enabled only in local profile
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Redis ─────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Logging ───────────────────────────────────────────────
# Default log level is INFO. Local profile overrides to DEBUG.
logging.level.com.tradelearn.server=INFO
logging.level.org.springframework.web.socket=WARN

# ── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
